<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#102a43"/>

  <!-- Accent bar left -->
  <rect x="0" y="0" width="8" height="630" fill="#b8860b"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative circle top right -->
  <circle cx="1100" cy="100" r="220" fill="#243b53" opacity="0.5"/>
  <circle cx="1100" cy="100" r="140" fill="#243b53" opacity="0.5"/>

  <!-- Accent line -->
  <rect x="80" y="280" width="60" height="4" fill="#b8860b"/>

  <!-- JD Finance wordmark -->
  <text x="80" y="220" font-family="Georgia, serif" font-size="88" font-weight="700" fill="#ffffff" letter-spacing="-2">JD Finance</text>

  <!-- Tagline -->
  <text x="80" y="320" font-family="Georgia, serif" font-size="32" fill="#d9e2ec" letter-spacing="0.5">Financial clarity, personally delivered.</text>

  <!-- Sub line -->
  <text x="80" y="390" font-family="Arial, sans-serif" font-size="22" fill="#486581">Auckland Mortgage Adviser · Home, Investment &amp; Construction Loans</text>

  <!-- Bottom detail -->
  <rect x="0" y="590" width="1200" height="40" fill="#243b53" opacity="0.6"/>
  <text x="80" y="617" font-family="Arial, sans-serif" font-size="18" fill="#486581">www.jdfinance.co.nz</text>
  <text x="1120" y="617" font-family="Arial, sans-serif" font-size="18" fill="#486581" text-anchor="end">FSP1010799</text>
</svg>
